backend:
  name: github
  repo: IROD-Lab/irod_lab_website
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

publish_mode: editorial_workflow

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "News"
    folder: "content/news/cms"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    path: "{{year}}-{{month}}-{{day}}-{{slug}}/index"
    extension: "qmd"
    format: "yaml-frontmatter"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "openings"
    label: "Openings"
    folder: "content/openings/positions"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    path: "{{year}}-{{month}}-{{day}}-{{slug}}/index"
    extension: "qmd"
    format: "yaml-frontmatter"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "members"
    label: "Members"
    folder: "content/people/members"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    extension: "qmd"
    format: "yaml-frontmatter"
    
    # 1. This tells CMS: "Save uploaded images right here, next to the index.qmd file"
    media_folder: "" 
    public_folder: ""

    fields:
      - label: "Full Name"
        name: "title"
        widget: "string"

      - label: "Role"
        name: "role"
        widget: "select"
        options: ["msc", "phd", "pi", "ra", "alumni", "pd"]
      
      # 2. THE IMAGE FIELD
      # 'required: false' is crucial. If they don't upload a photo, 
      # Quarto will fall back to the default '/images/blank.jpg' in your metadata.yml
      - label: "Profile Image"
        name: "image"
        widget: "image"
        required: false
        
      - label: "Bio" 
        name: "body"
        widget: "markdown"

  - name: "research"
    label: "Research Projects"
    folder: "content/research/featured"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    extension: "qmd"
    format: "yaml-frontmatter"
    
    media_folder: ""
    public_folder: ""

    fields:
      - label: "Project Title"
        name: "title"
        widget: "string"
      
      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
      
      - label: "Short Description"
        name: "description"
        widget: "text"
        hint: "Brief summary shown in listings"
      
      - label: "Date"
        name: "date"
        widget: "datetime"
      
      - label: "Categories"
        name: "categories"
        widget: "list"
        hint: "e.g., robotics, mechanism design, control"
        allow_add: true
        default: ["robotics"]
      
      - label: "Project Details"
        name: "body"
        widget: "markdown"

  - name: "pages"
    label: "Site Pages"
    format: "yaml-frontmatter"
    files:
      - label: "Home Page"
        name: "home"
        file: "index.qmd"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}
      
      - label: "Research Page"
        name: "research"
        file: "content/research/index.qmd"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}
      
      - label: "People/Team Page"
        name: "people"
        file: "content/people/index.qmd"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}
      
      - label: "News Page"
        name: "news-page"
        file: "content/news/index.qmd"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Description", name: "description", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}
      
      - label: "Openings Page"
        name: "openings-page"
        file: "content/openings/index.qmd"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}